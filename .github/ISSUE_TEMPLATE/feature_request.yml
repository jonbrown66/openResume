name: Feature request
description: Suggest an improvement for openResume.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
      placeholder: Describe the workflow or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should openResume do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product area
      options:
        - Import
        - Editing
        - Templates
        - AI assistant
        - Export
        - Settings
        - Mobile experience
        - Developer experience
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there simpler ways to solve this?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, examples, or links when useful.
